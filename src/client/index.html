<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ghostfolio Agent</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Ghostfolio Agent</h1>

      <section class="config">
        <label>
          Agent API URL
          <input id="agentApiUrl" type="text" value="http://localhost:3334" />
        </label>
        <label>
          JWT (Bearer token)
          <textarea id="jwt" rows="4" placeholder="Paste Ghostfolio JWT"></textarea>
        </label>
      </section>

      <section id="messages" class="messages"></section>

      <section class="inputRow">
        <input id="messageInput" type="text" placeholder="Ask anything about your portfolio" />
        <button id="sendButton" type="button">Send</button>
      </section>
    </main>

    <script type="module" src="./main.ts"></script>
  </body>
  </html>
