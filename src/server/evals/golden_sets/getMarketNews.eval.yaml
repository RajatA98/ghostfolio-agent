  must_contain: []
  must_not_contain:
    - "guaranteed"
    - "you should buy"

- id: "gs-news-003"
  query: "What's happening with TSLA? Show me the latest headlines and price."
  expected_tools:
    - getMarketPrices
  expected_sources:
    - getMarketPrices
  if_news_enabled:
    expected_tools:
      - getMarketNews
      - getMarketPrices
    expected_sources:
      - getMarketNews
      - getMarketPrices
  must_contain:
    - "TSLA"
  must_not_contain:
    - "you should buy"

