# Golden Set — getMarketNews
# Tests the market news tool: recent news for stock symbols via Finnhub.
# When AGENT_ENABLE_NEWS=true: agent uses getMarketNews (Finnhub).
# When disabled (default): agent may deflect or use other tools for the query.

# ─── NEWS QUERIES ──────────────────────────────────────────────────

- id: "gs-news-001"
  query: "What's the latest news on AAPL?"
  expected_tools: []
  expected_sources: []
  if_news_enabled:
    expected_tools:
      - getMarketNews
    expected_sources:
      - getMarketNews
  must_contain: []
  must_not_contain:
    - "guaranteed"
    - "you should buy"

