# Golden Set — simulateAllocationChange
# 12 deterministic, binary pass/fail cases. Zero LLM judge cost.

# ─── HAPPY PATH ─────────────────────────────────────────────────────

- id: "gs-sim-001"
  query: "If I add $500 of VTI, how does my allocation change?"
  expected_tools:
    - getPortfolioSnapshot
    - simulateAllocationChange
  expected_sources:
    - simulateAllocationChange
  must_contain:
    - "VTI"
    - "allocation"
  must_not_contain:
    - "I can't simulate"
    - "not supported"

- id: "gs-sim-002"
  query: "What's my portfolio worth, and if I add $1000 of VTI and $1000 of BND, what would the new allocation look like?"
  expected_tools:
    - getPortfolioSnapshot
    - simulateAllocationChange
  expected_sources:
    - simulateAllocationChange
  must_contain:
    - "VTI"
    - "BND"
    - "allocation"
  must_not_contain:
    - "I can't simulate"
    - "not supported"

- id: "gs-sim-003"
  query: "Simulate buying $2000 of MSFT and show me the new allocation."
  expected_tools:
    - getPortfolioSnapshot
    - simulateAllocationChange
  expected_sources:
    - simulateAllocationChange
  must_contain:
    - "MSFT"
  must_not_contain:
    - "I can't"

- id: "gs-sim-004"
  query: "What if I sell $500 of AAPL?"
  expected_tools:
    - getPortfolioSnapshot
    - simulateAllocationChange
  expected_sources:
    - simulateAllocationChange
  must_contain:
    - "AAPL"
  must_not_contain:
    - "I can't simulate"

