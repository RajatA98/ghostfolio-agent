# Labeled Scenarios — Single-Tool by Type
# Tests coverage by tool: snapshot, performance, market prices, simulation, portfolio data.

# ─── snapshot_only ──────────────────────────────────────────────────

- id: "sc-st-001"
  query: "What's my allocation by symbol?"
  category: single_tool
  subcategory: snapshot_only
  difficulty: straightforward
  expected_tools:
    - getPortfolioSnapshot
  expected_sources:
    - getPortfolioSnapshot
  must_contain:
    - "allocation"
  must_not_contain:
    - "I don't know"

- id: "sc-st-002"
  query: "What is my total portfolio value?"
  category: single_tool
  subcategory: snapshot_only
  difficulty: straightforward
  expected_tools:
    - getPortfolioSnapshot
  expected_sources:
    - getPortfolioSnapshot
  must_contain:
    - "value"
  must_not_contain:
    - "I don't know"

- id: "sc-st-003"
  query: "Tell me about my portfolio."
  category: single_tool
  subcategory: snapshot_only
  difficulty: ambiguous
  expected_tools:
    - getPortfolioSnapshot
  expected_sources:
    - getPortfolioSnapshot
  must_contain: []
  must_not_contain:
    - "I don't understand"

