# ─── market_prices_only ──────────────────────────────────────────────

- id: "sc-st-007"
  query: "What's the price of AAPL?"
  category: single_tool
  subcategory: market_prices_only
  difficulty: straightforward
  expected_tools:
    - getPortfolioSnapshot
  expected_sources:
    - getPortfolioSnapshot
  if_market_enabled:
    expected_tools:
      - getPortfolioSnapshot
      - getMarketPrices
    expected_sources:
      - getMarketPrices
  must_contain: []
  must_not_contain:
    - "you should buy"

- id: "sc-st-008"
  query: "Get me the current price of VTI and BND."
  category: single_tool
  subcategory: market_prices_only
  difficulty: straightforward
  expected_tools:
    - getPortfolioSnapshot
  expected_sources:
    - getPortfolioSnapshot
  if_market_enabled:
    expected_tools:
      - getPortfolioSnapshot
      - getMarketPrices
    expected_sources:
      - getMarketPrices
  must_contain: []
  must_not_contain:
    - "guaranteed"

- id: "sc-st-009"
  query: "What are MSFT and GOOGL trading at?"
  category: single_tool
  subcategory: market_prices_only
  difficulty: ambiguous
  expected_tools:
    - getPortfolioSnapshot
  expected_sources:
    - getPortfolioSnapshot
  if_market_enabled:
    expected_tools:
      - getPortfolioSnapshot
      - getMarketPrices
    expected_sources:
      - getMarketPrices
  must_contain: []
  must_not_contain:
    - "I recommend"

