# Labeled Scenarios — Multi-Step
# Tests queries requiring multiple tools in combination.

- id: "sc-multi-001"
  query: "Show my current allocation and simulate selling 50% of my largest holding."
  category: multi_tool
  subcategory: snapshot_and_simulation
  difficulty: moderate
  expected_tools:
    - getPortfolioSnapshot
    - simulateAllocationChange
  expected_sources:
    - getPortfolioSnapshot
    - simulateAllocationChange
  must_contain:
    - "allocation"
  must_not_contain:
    - "I can't"

- id: "sc-multi-002"
  query: "Compare my YTD performance with my current allocation breakdown."
  category: multi_tool
  subcategory: snapshot_and_performance
  difficulty: straightforward
  expected_tools:
    - getPortfolioSnapshot
    - getPerformance
  expected_sources:
    - getPortfolioSnapshot
    - getPerformance
  must_contain:
    - "allocation"
    - "performance"
  must_not_contain:
    - "I don't know"

