# Golden Set — Ghostfolio Portfolio Agent
# Demo: 8 passing cases (gs-001 … gs-008). Failing cases removed for demo; re-add after fixes.
#
# GOLDEN SET CRITERIA (every case meets these):
# - DETERMINISTIC: Same response → same pass/fail (checks use only: tool names, success flags, substring in/not in normalized text, numeric comparison).
# - BINARY: Pass or fail only; no partial credit.
# - CODE-ONLY: No LLM judge; zero evaluation API cost.
# - Allowed fields: expected_tools, expected_sources, must_contain, must_not_contain; optional: max_confidence, must_satisfy, if_valuation_method, allow_unavailable, if_unavailable_must_contain.

# ─── 1. EMPTY PORTFOLIO (start here) ────────────────────────────────

- id: "gs-001"
  query: "What's my allocation?"
  setup:
    forceEmptyHoldings: true
  expected_tools:
    - getPortfolioSnapshot
  expected_sources:
    - getPortfolioSnapshot
  must_contain:
    - "no holdings"
  must_not_contain:
    - "your top holding"
    - "largest position"
  max_confidence: 0.4

# ─── 2. ADD ASSETS (simulate buying — early tests) ───────────────────

- id: "gs-002"
  query: "What's my portfolio worth, and if I add $1000 of VTI and $1000 of BND, what would the new allocation look like?"
  expected_tools:
    - getPortfolioSnapshot
    - simulateAllocationChange
  expected_sources:
    - simulateAllocationChange
  must_contain:
    - "VTI"
    - "BND"
    - "allocation"
  must_not_contain:
    - "I can't simulate"
    - "not supported"

# ─── 3. ALLOCATION & VALUE (portfolio with holdings) ─────────────────

- id: "gs-003"
  query: "What's my portfolio allocation by symbol?"
  expected_tools:
    - getPortfolioSnapshot
  expected_sources:
    - getPortfolioSnapshot
  must_contain:
    - "allocation"
  must_not_contain:
    - "I don't know"
    - "no information"

- id: "gs-004"
  query: "What is my total portfolio value?"
  expected_tools:
    - getPortfolioSnapshot
  expected_sources:
    - getPortfolioSnapshot
  must_contain:
    - "value"
  must_not_contain:
    - "I don't know"
    - "no data"

- id: "gs-005"
  query: "Show me my allocation by asset class."
  expected_tools:
    - getPortfolioSnapshot
  expected_sources:
    - getPortfolioSnapshot
  must_contain:
    - "allocation"
  must_not_contain:
    - "I don't know"

- id: "gs-006"
  query: "Give me allocation percents that sum to 100%."
  expected_tools:
    - getPortfolioSnapshot
  expected_sources:
    - getPortfolioSnapshot
  must_contain:
    - "%"
  must_not_contain:
    - "I can't"
  must_satisfy:
    - allocationPercentsSumApprox100

- id: "gs-007"
  query: "Show my allocation and tell me what percent is AAPL."
  expected_tools:
    - getPortfolioSnapshot
  expected_sources:
    - getPortfolioSnapshot
  must_contain:
    - "AAPL"
  must_not_contain:
    - "I don't know"
  if_valuation_method:
    cost_basis:
      must_contain:
        - "cost basis"

# ─── 4. PERFORMANCE ─────────────────────────────────────────────────
# (gs-002, gs-007, gs-009, gs-013 removed for demo — re-add after fixes)

# ─── 5. SELL SIMULATION ────────────────────────────────────────────
# (gs-008 removed for demo — re-add after fixes)

# ─── 6. MULTI-STEP ──────────────────────────────────────────────────

- id: "gs-008"
  query: "Compare my year-to-date performance with my current allocation breakdown."
  expected_tools:
    - getPortfolioSnapshot
    - getPerformance
  expected_sources:
    - getPortfolioSnapshot
    - getPerformance
  must_contain:
    - "allocation"
    - "performance"
  must_not_contain:
    - "I don't know"

